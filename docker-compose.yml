version: "3.8"

networks:
  internal:
    driver: bridge

secrets:
  db_password:
    file: ./secrets/db_password
  jwt_secret:
    file: ./secrets/jwt_secret
  n8n_encryption_key:
    file: ./secrets/n8n_encryption_key

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: nv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: neuravolt
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: neuravolt
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    secrets:
      - db_password
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuravolt"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  # Redis (Queue + Cache)
  redis:
    image: redis:7-alpine
    container_name: nv-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  # Traefik (Edge Proxy & SSL)
  traefik:
    image: traefik:v2.11
    container_name: nv-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@neuravolt.cloud"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--ping=true"
      - "--providers.file.directory=/dynamic"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/letsencrypt:/letsencrypt
      - ./traefik/dynamic.yml:/dynamic/dynamic.yml:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  # Backend API
  api:
    build: ./backend
    container_name: nv-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://neuravolt:neuravolt_dev_pwd@nv-postgres:5432/neuravolt
      - REDIS_URL=redis://nv-redis:6379
      - JWT_SECRET_FILE=/run/secrets/jwt_secret
      - NODE_ENV=production
      - DOCKER_NETWORK=n8n_hosting_internal
    secrets:
      - db_password
      - jwt_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.neuravolt.cloud`)"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  # User Portal (Next.js)
  app:
    build:
      context: ./app
      args:
        NEXT_PUBLIC_API_URL: https://api.neuravolt.cloud
    container_name: nv-app
    restart: unless-stopped
    ports:
      - "3028:3001"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.neuravolt.cloud
      - NEXTAUTH_SECRET_FILE=/run/secrets/jwt_secret
      - NEXTAUTH_URL=https://app.neuravolt.cloud
    secrets:
      - jwt_secret
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.neuravolt.cloud`)"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  # Admin Panel (Next.js)
  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: https://api.neuravolt.cloud
    container_name: nv-admin
    restart: unless-stopped
    ports:
      - "3018:3002"
    environment:
      - NEXT_PUBLIC_API_URL=https://api.neuravolt.cloud
      - NEXTAUTH_SECRET_FILE=/run/secrets/jwt_secret
      - NEXTAUTH_URL=https://admin.neuravolt.cloud
    secrets:
      - jwt_secret
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`admin.neuravolt.cloud`)"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: nv-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    container_name: nv-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`monitor.neuravolt.cloud`)"

  loki:
    image: grafana/loki:2.9.0
    container_name: nv-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - internal

  promtail:
    image: grafana/promtail:2.9.0
    container_name: nv-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    networks:
      - internal

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: nv-cadvisor
    privileged: true
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - internal

  dozzle:
    image: amir20/dozzle:latest
    container_name: nv-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`logs.neuravolt.cloud`)"

  landing:
    image: nginx:alpine
    container_name: nv-landing
    restart: unless-stopped
    volumes:
      - ./landing:/usr/share/nginx/html:ro
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`neuravolt.cloud`, `www.neuravolt.cloud`)"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
